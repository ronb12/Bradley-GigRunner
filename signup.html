<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign up – Bradley GigRunner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #FF3008;
      --red-dark: #cc2600;
      --white: #FFFFFF;
      --bg: #F6F6F6;
      --dark: #191919;
      --gray: #767676;
      --border: #E8E8E8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--red);
      font-size: 20px;
      font-weight: 800;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .logo-icon {
      width: 56px;
      height: 56px;
      background: var(--red);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: white;
      font-size: 26px;
    }

    .card-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--gray);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      color: var(--dark);
      background: white;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,48,8,0.1);
    }

    .form-input::placeholder { color: #aaa; }

    /* Role selection */
    .role-section {
      margin-bottom: 20px;
    }

    .role-section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 10px;
      display: block;
    }

    .role-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-option {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .role-option:hover { border-color: var(--red); }

    .role-option input[type="checkbox"] { display: none; }

    .role-option.selected {
      border-color: var(--red);
      background: #fff5f3;
    }

    .role-option .role-icon { font-size: 22px; }

    .role-option .role-text { display: flex; flex-direction: column; }
    .role-option .role-name { font-size: 13px; font-weight: 700; color: var(--dark); }
    .role-option .role-desc { font-size: 11px; color: var(--gray); }

    .check-indicator {
      margin-left: auto;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
    }

    .role-option.selected .check-indicator {
      background: var(--red);
      border-color: var(--red);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: var(--red-dark); }
    .btn-submit:active { transform: scale(0.99); }

    .footer-links {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--gray);
    }

    .footer-links a {
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-links a:hover { text-decoration: underline; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: var(--gray);
      text-decoration: none;
    }

    .back-link:hover { color: var(--dark); }

    .error-message {
      color: #d93025;
      font-size: 13px;
      margin-top: 12px;
      padding: 12px 14px;
      background: #fce8e6;
      border-radius: 8px;
      display: none;
    }

    .error-message.show { display: block; }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <i class="fas fa-motorcycle"></i>
      GigRunner
    </a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <div class="logo-icon"><i class="fas fa-motorcycle"></i></div>
        <h1>Create an account</h1>
        <p>Join GigRunner today — it's free</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="firstName">First name</label>
          <input class="form-input" type="text" id="firstName" placeholder="John" autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Last name</label>
          <input class="form-input" type="text" id="lastName" placeholder="Doe" autocomplete="family-name" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone number</label>
        <input class="form-input" type="tel" id="phone" placeholder="(555) 000-0000" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>

      <div class="role-section">
        <span class="role-section-label">I want to join as... (select all that apply)</span>
        <div class="role-options">
          <label class="role-option" id="customerOption">
            <input type="checkbox" id="roleCustomer" />
            <span class="role-icon">🛍️</span>
            <span class="role-text">
              <span class="role-name">Customer</span>
              <span class="role-desc">Order food</span>
            </span>
            <span class="check-indicator"><i class="fas fa-check"></i></span>
          </label>
          <label class="role-option" id="driverOption">
            <input type="checkbox" id="roleDriver" />
            <span class="role-icon">🚗</span>
            <span class="role-text">
              <span class="role-name">Driver</span>
              <span class="role-desc">Deliver & earn</span>
            </span>
            <span class="check-indicator"><i class="fas fa-check"></i></span>
          </label>
          <label class="role-option" id="restaurantOption">
            <input type="checkbox" id="roleRestaurant" />
            <span class="role-icon">🍽️</span>
            <span class="role-text">
              <span class="role-name">Restaurant</span>
              <span class="role-desc">List & sell food</span>
            </span>
            <span class="check-indicator"><i class="fas fa-check"></i></span>
          </label>
        </div>
      </div>

      <!-- Restaurant-specific fields (shown only when Restaurant is selected) -->
      <div id="restaurantFields" style="display:none;border:1.5px solid #FF3008;border-radius:12px;padding:18px;margin-bottom:16px;background:#fff9f8">
        <div style="font-size:13px;font-weight:700;color:#FF3008;margin-bottom:12px;">🍽️ Restaurant Details</div>
        <div class="form-group">
          <label class="form-label" for="restaurantName">Restaurant Name <span style="color:#dc3545">*</span></label>
          <input class="form-input" type="text" id="restaurantName" placeholder="e.g. Joe's Burgers" />
        </div>
        <div class="form-group">
          <label class="form-label" for="restaurantCuisine">Cuisine Type <span style="color:#dc3545">*</span></label>
          <select class="form-input" id="restaurantCuisine">
            <option value="">Select cuisine...</option>
            <option value="American">American</option>
            <option value="Italian">Italian</option>
            <option value="Mexican">Mexican</option>
            <option value="Chinese">Chinese</option>
            <option value="Japanese">Japanese</option>
            <option value="Indian">Indian</option>
            <option value="Thai">Thai</option>
            <option value="Mediterranean">Mediterranean</option>
            <option value="Fast Food">Fast Food</option>
            <option value="Pizza">Pizza</option>
            <option value="Seafood">Seafood</option>
            <option value="Healthy">Healthy</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Sandwiches">Sandwiches</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="restaurantAddress">Restaurant Address <span style="color:#dc3545">*</span></label>
          <input class="form-input" type="text" id="restaurantAddress" placeholder="123 Main St, Columbia, SC" />
        </div>
        <div class="form-group">
          <label class="form-label" for="restaurantPhone">Restaurant Phone</label>
          <input class="form-input" type="tel" id="restaurantPhone" placeholder="(803) 555-0100" />
        </div>
      </div>

      <button class="btn-submit" id="signupBtn">Create account</button>

      <div id="errorMessage" class="error-message"></div>

      <div class="footer-links">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      <a href="index.html" class="back-link">← Back to home</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYJkHvoa43DbF5Wn_a8uGZ9o_olCMnuFc",
      authDomain: "bradley-gigrunner.firebaseapp.com",
      projectId: "bradley-gigrunner",
      storageBucket: "bradley-gigrunner.firebasestorage.app",
      messagingSenderId: "497753581430",
      appId: "1:497753581430:web:db6c22866194dd3285bc57"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Role toggle UI
    document.getElementById('customerOption').addEventListener('click', () => {
      const cb = document.getElementById('roleCustomer');
      cb.checked = !cb.checked;
      document.getElementById('customerOption').classList.toggle('selected', cb.checked);
    });

    document.getElementById('driverOption').addEventListener('click', () => {
      const cb = document.getElementById('roleDriver');
      cb.checked = !cb.checked;
      document.getElementById('driverOption').classList.toggle('selected', cb.checked);
    });

    document.getElementById('restaurantOption').addEventListener('click', () => {
      const cb = document.getElementById('roleRestaurant');
      cb.checked = !cb.checked;
      document.getElementById('restaurantOption').classList.toggle('selected', cb.checked);
      document.getElementById('restaurantFields').style.display = cb.checked ? 'block' : 'none';
    });

    document.getElementById("signupBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const isDriver = document.getElementById("roleDriver").checked;
      const isCustomer = document.getElementById("roleCustomer").checked;
      const isRestaurant = document.getElementById("roleRestaurant").checked;
      const errorDiv = document.getElementById("errorMessage");

      errorDiv.classList.remove('show');

      if (!firstName || !lastName || !phone || !email || !password) {
        errorDiv.innerText = "Please fill out all fields.";
        errorDiv.classList.add('show');
        return;
      }

      if (!isDriver && !isCustomer && !isRestaurant) {
        errorDiv.innerText = "Please select at least one role.";
        errorDiv.classList.add('show');
        return;
      }

      // Validate restaurant fields if restaurant role selected
      if (isRestaurant) {
        const rName = document.getElementById("restaurantName").value.trim();
        const rCuisine = document.getElementById("restaurantCuisine").value;
        const rAddress = document.getElementById("restaurantAddress").value.trim();
        if (!rName || !rCuisine || !rAddress) {
          errorDiv.innerText = "Please fill in all restaurant details.";
          errorDiv.classList.add('show');
          return;
        }
      }

      const roles = [];
      if (isCustomer) roles.push("customer");
      if (isDriver) roles.push("driver");
      if (isRestaurant) roles.push("restaurant");

      const btn = document.getElementById('signupBtn');
      btn.innerText = 'Creating account...';
      btn.disabled = true;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCredential.user.uid;

        await setDoc(doc(db, "users", uid), {
          firstName,
          lastName,
          name: `${firstName} ${lastName}`,
          phone,
          email,
          roles,
          createdAt: new Date()
        });

        // Create restaurant profile doc
        if (isRestaurant) {
          const rName = document.getElementById("restaurantName").value.trim();
          const rCuisine = document.getElementById("restaurantCuisine").value;
          const rAddress = document.getElementById("restaurantAddress").value.trim();
          const rPhone = document.getElementById("restaurantPhone").value.trim();
          await setDoc(doc(db, "restaurants", uid), {
            ownerId: uid,
            ownerEmail: email,
            name: rName,
            cuisine: rCuisine,
            address: rAddress,
            phone: rPhone || phone,
            isOpen: false,
            rating: 0,
            deliveryFee: 3.99,
            deliveryTime: "30-45 min",
            menu: [],
            orderCount: 0,
            createdAt: new Date()
          });
        }

        window.location.href = "login.html";
      } catch (error) {
        btn.innerText = 'Create account';
        btn.disabled = false;
        errorDiv.innerText = "Signup failed: " + error.message;
        errorDiv.classList.add('show');
      }
    });
  </script>
</body>
</html>
