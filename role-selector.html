<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Role - Bradley GigRunner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico?v=1" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F6F6F6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: #FF3008;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: white;
      font-size: 26px;
    }
    h1 {
      color: #191919;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #767676;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .role-button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin: 10px 0;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 600;
      background: #FF3008;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .role-button:hover { background: #cc2600; }
    .role-button:active { transform: scale(0.99); }
    .role-button .role-emoji { font-size: 20px; }
    .logout-button {
      margin-top: 20px;
      background: white;
      color: #767676;
      border: 1.5px solid #E8E8E8;
    }
    .logout-button:hover { background: #F6F6F6; color: #191919; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon"><i class="fas fa-motorcycle"></i></div>
    <h1>Welcome back!</h1>
    <p class="subtitle">Choose how you want to use GigRunner today</p>
    <div id="roleButtons">Loading roles...</div>
    <button class="role-button logout-button" onclick="logout()">
      <span class="role-emoji">🚪</span> Sign out
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYJkHvoa43DbF5Wn_a8uGZ9o_olCMnuFc",
      authDomain: "bradley-gigrunner.firebaseapp.com",
      projectId: "bradley-gigrunner",
      storageBucket: "bradley-gigrunner.firebasestorage.app",
      messagingSenderId: "497753581430",
      appId: "1:497753581430:web:db6c22866194dd3285bc57"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const buttonsDiv = document.getElementById("roleButtons");

    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.href = "login.html";

      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (!userDoc.exists()) {
        buttonsDiv.innerHTML = "<p>User profile not found.</p>";
        return;
      }

      const roles = userDoc.data().roles || [];

      buttonsDiv.innerHTML = "";

      if (roles.includes("admin")) {
        buttonsDiv.innerHTML += `<button class="role-button" onclick="location.href='admin.html'"><span class="role-emoji">👑</span> Admin Dashboard</button>`;
      }
      if (roles.includes("driver")) {
        buttonsDiv.innerHTML += `<button class="role-button" onclick="location.href='driver.html'"><span class="role-emoji">🚗</span> Driver Dashboard</button>`;
      }
      if (roles.includes("customer")) {
        buttonsDiv.innerHTML += `<button class="role-button" onclick="location.href='customer.html'"><span class="role-emoji">🛍️</span> Order Food</button>`;
      }

      if (buttonsDiv.innerHTML.trim() === "") {
        buttonsDiv.innerHTML = "<p>No roles assigned to this account.</p>";
      }
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };
  </script>
</body>
</html>
